<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D模型展示</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/DRACOLoader.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6B00',
            secondary: '#1E293B',
            dark: '#0F172A',
            light: '#F8FAFC'
          }
        }
      }
    }
  </script>

  <style>
    body { overflow-x: hidden; }
    .canvas-container {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 420px;
      background: #F8FAFC;
      overflow: hidden;
    }
    #viewer-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .panel {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
    }
    .btn {
      transition: all .2s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }
  </style>
</head>
<body class="bg-light text-secondary">

  <nav class="bg-white shadow-sm border-b border-gray-100">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa fa-cube text-primary text-2xl"></i>
        <div>
          <div class="font-bold text-lg">3D模型展示</div>
          <div class="text-xs text-gray-500">极简版 Three.js Viewer</div>
        </div>
      </div>
      <a href="#controls" class="text-sm hover:text-primary transition">控制面板</a>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <section class="mb-8">
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 p-4 bg-secondary text-white">
          <h1 class="text-xl font-semibold">3D模型预览</h1>
          <div class="flex flex-wrap gap-2">
            <button id="reset-view" class="btn px-4 py-2 rounded-lg bg-primary text-white">
              <i class="fa fa-refresh mr-1"></i>重置视图
            </button>
            <button id="toggle-rotate" class="btn px-4 py-2 rounded-lg bg-slate-600 text-white">
              <i class="fa fa-repeat mr-1"></i>暂停旋转
            </button>
            <button id="upload-btn" class="btn px-4 py-2 rounded-lg bg-green-600 text-white">
              <i class="fa fa-upload mr-1"></i>上传模型
            </button>
          </div>
        </div>

        <div class="canvas-container">
          <canvas id="viewer-canvas"></canvas>
        </div>
      </div>
    </section>

    <section id="controls" class="max-w-4xl mx-auto">
      <div class="panel rounded-2xl shadow-lg p-6">
        <h2 class="text-lg font-semibold mb-6 flex items-center">
          <i class="fa fa-sliders text-primary mr-2"></i>控制面板
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">旋转速度</label>
            <input id="rotation-speed" type="range" min="0" max="10" value="5" class="w-full" />
            <div class="flex justify-between text-xs text-gray-500 mt-1">
              <span>慢</span>
              <span>快</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">环境光照</label>
            <input id="ambient-light" type="range" min="0" max="100" value="70" class="w-full" />
            <div class="flex justify-between text-xs text-gray-500 mt-1">
              <span>暗</span>
              <span>亮</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">缩放比例</label>
            <input id="scale-control" type="range" min="50" max="150" value="100" class="w-full" />
            <div class="flex justify-between text-xs text-gray-500 mt-1">
              <span>小</span>
              <span>大</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">模型颜色</label>
            <div class="grid grid-cols-4 gap-2">
              <button class="color-btn h-10 rounded-lg border-2 border-transparent hover:border-gray-400" style="background:#FF6B00" data-color="#FF6B00"></button>
              <button class="color-btn h-10 rounded-lg border-2 border-transparent hover:border-gray-400" style="background:#2563EB" data-color="#2563EB"></button>
              <button class="color-btn h-10 rounded-lg border-2 border-transparent hover:border-gray-400" style="background:#10B981" data-color="#10B981"></button>
              <button class="color-btn h-10 rounded-lg border-2 border-transparent hover:border-gray-400" style="background:#6B7280" data-color="#6B7280"></button>
            </div>
          </div>
        </div>

        <div class="mt-6 text-sm text-gray-600 leading-7">
          <p>鼠标左键拖动可旋转，滚轮可缩放，右键拖动可平移。</p>
          <p>支持上传 GLTF / GLB 模型文件，适合直接部署到 GitHub Pages。</p>
        </div>
      </div>
    </section>
  </main>

  <input id="file-input" type="file" accept=".gltf,.glb,model/gltf+json,model/gltf-binary" class="hidden" />

  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-white/30 border-t-white rounded-full animate-spin mx-auto mb-4"></div>
      <p id="loading-text" class="text-white text-lg">加载中...</p>
    </div>
  </div>

  <footer class="mt-12 py-8 text-center text-sm text-gray-500">
    <p>2026 3D模型展示页面</p>
  </footer>

  <script>
    const canvas = document.getElementById('viewer-canvas');
    const container = canvas.parentElement;
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xF8FAFC);

    const camera = new THREE.PerspectiveCamera(
      60,
      container.clientWidth / container.clientHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.2, 4.5);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = true;
    controls.enableZoom = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.1);
    directionalLight.position.set(5, 8, 6);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    pointLight.position.set(-5, 3, 5);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(10, 10, 0xd1d5db, 0xe5e7eb);
    grid.position.y = -1.2;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.ShadowMaterial({ opacity: 0.15 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.19;
    ground.receiveShadow = true;
    scene.add(ground);

    let modelRoot = null;
    let autoRotate = true;
    let rotationSpeed = 0.005;
    const clock = new THREE.Clock();

    function showLoading(text = '加载中...') {
      loadingText.textContent = text;
      loadingOverlay.classList.remove('hidden');
    }

    function hideLoading() {
      loadingOverlay.classList.add('hidden');
    }

    function clearCurrentModel() {
      if (!modelRoot) return;
      scene.remove(modelRoot);
      modelRoot.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) {
            obj.material.forEach(m => m.dispose && m.dispose());
          } else if (obj.material.dispose) {
            obj.material.dispose();
          }
        }
      });
      modelRoot = null;
    }

    function fitCameraToObject(object, offset = 1.4) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2));
      cameraZ *= offset;

      camera.position.set(center.x, center.y + maxDim * 0.2, center.z + cameraZ);
      controls.target.copy(center);
      controls.update();

      const minZ = box.min.z;
      const cameraToFarEdge = (minZ < 0) ? -minZ + cameraZ : cameraZ - minZ;
      camera.far = cameraToFarEdge * 3;
      camera.updateProjectionMatrix();
    }

    function createFallbackModel() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1.2, 1.5),
        new THREE.MeshStandardMaterial({
          color: 0xFF6B00,
          metalness: 0.25,
          roughness: 0.45
        })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const shaftMat = new THREE.MeshStandardMaterial({
        color: 0xbfc5cd,
        metalness: 0.8,
        roughness: 0.25
      });

      const shaft1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 1.8, 32),
        shaftMat
      );
      shaft1.rotation.x = Math.PI / 2;
      shaft1.position.z = 1.1;
      shaft1.castShadow = true;
      group.add(shaft1);

      const shaft2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.24, 0.24, 2.2, 32),
        shaftMat
      );
      shaft2.rotation.x = Math.PI / 2;
      shaft2.position.z = -1.2;
      shaft2.castShadow = true;
      group.add(shaft2);

      const topBox = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.5, 0.9),
        new THREE.MeshStandardMaterial({
          color: 0xf97316,
          metalness: 0.2,
          roughness: 0.5
        })
      );
      topBox.position.set(0.3, 0.8, 0);
      topBox.castShadow = true;
      group.add(topBox);

      return group;
    }

    function applyColorToModel(hexColor) {
      if (!modelRoot) return;
      const color = new THREE.Color(hexColor);
      modelRoot.traverse(child => {
        if (child.isMesh && child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(mat => {
              if (mat.color) mat.color.set(color);
            });
          } else {
            if (child.material.color) child.material.color.set(color);
          }
        }
      });
    }

    function loadDefaultModel() {
      showLoading('加载默认模型...');
      clearCurrentModel();

      const loader = new THREE.GLTFLoader();
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
        (gltf) => {
          modelRoot = gltf.scene;
          modelRoot.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
          scene.add(modelRoot);
          fitCameraToObject(modelRoot);
          hideLoading();
        },
        (xhr) => {
          if (xhr.total) {
            const progress = Math.round((xhr.loaded / xhr.total) * 100);
            showLoading(`加载默认模型... ${progress}%`);
          }
        },
        () => {
          modelRoot = createFallbackModel();
          scene.add(modelRoot);
          fitCameraToObject(modelRoot);
          hideLoading();
        }
      );
    }

    function loadUserModel(file) {
      const ext = file.name.toLowerCase().split('.').pop();
      if (!['gltf', 'glb'].includes(ext)) {
        alert('当前精简版仅支持 GLTF / GLB 文件。');
        return;
      }

      showLoading('加载上传模型...');
      clearCurrentModel();

      const url = URL.createObjectURL(file);
      const loader = new THREE.GLTFLoader();
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        url,
        (gltf) => {
          modelRoot = gltf.scene;
          modelRoot.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
          scene.add(modelRoot);
          fitCameraToObject(modelRoot);
          hideLoading();
          URL.revokeObjectURL(url);
        },
        (xhr) => {
          if (xhr.total) {
            const progress = Math.round((xhr.loaded / xhr.total) * 100);
            showLoading(`加载上传模型... ${progress}%`);
          }
        },
        (err) => {
          console.error(err);
          hideLoading();
          URL.revokeObjectURL(url);
          alert('模型加载失败，请确认文件有效且纹理资源完整。');
          modelRoot = createFallbackModel();
          scene.add(modelRoot);
          fitCameraToObject(modelRoot);
        }
      );
    }

    document.getElementById('rotation-speed').addEventListener('input', (e) => {
      rotationSpeed = Number(e.target.value) * 0.001;
    });

    document.getElementById('ambient-light').addEventListener('input', (e) => {
      ambientLight.intensity = Number(e.target.value) / 100;
    });

    document.getElementById('scale-control').addEventListener('input', (e) => {
      if (!modelRoot) return;
      const scale = Number(e.target.value) / 100;
      modelRoot.scale.set(scale, scale, scale);
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyColorToModel(btn.dataset.color);
      });
    });

    document.getElementById('reset-view').addEventListener('click', () => {
      if (!modelRoot) return;
      modelRoot.rotation.set(0, 0, 0);
      modelRoot.scale.set(1, 1, 1);
      document.getElementById('scale-control').value = 100;
      document.getElementById('rotation-speed').value = 5;
      document.getElementById('ambient-light').value = 70;
      ambientLight.intensity = 0.7;
      rotationSpeed = 0.005;
      fitCameraToObject(modelRoot);
    });

    document.getElementById('toggle-rotate').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.currentTarget.innerHTML = autoRotate
        ? '<i class="fa fa-repeat mr-1"></i>暂停旋转'
        : '<i class="fa fa-play mr-1"></i>继续旋转';
    });

    document.getElementById('upload-btn').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadUserModel(file);
      e.target.value = '';
    });

    window.addEventListener('resize', () => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (modelRoot && autoRotate) {
        modelRoot.rotation.y += rotationSpeed * (delta * 60);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    loadDefaultModel();
    animate();
  </script>
</body>
</html>
