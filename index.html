<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工业3D模型展示</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/loaders/STLLoader.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            secondary: '#1e293b',
            light: '#f8fafc'
          }
        }
      }
    };
  </script>

  <style>
    body { overflow-x: hidden; }
    .canvas-container {
      position: relative;
      width: 100%;
      height: 68vh;
      min-height: 460px;
      background: #f3f4f6;
      overflow: hidden;
    }
    #viewer-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .panel {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
    }
    .btn {
      transition: all .2s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
    }
    .color-swatch.active {
      outline: 3px solid #111827;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="bg-light text-slate-800">

  <nav class="bg-white border-b border-slate-200 shadow-sm">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa fa-cube text-primary text-2xl"></i>
        <div>
          <div class="text-lg font-bold">工业3D模型展示</div>
          <div class="text-xs text-slate-500">GLB / GLTF / OBJ / STL Viewer</div>
        </div>
      </div>
      <a href="#controls" class="text-sm hover:text-primary transition">控制面板</a>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <section class="mb-8">
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="p-4 bg-secondary text-white flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <h1 class="text-xl font-semibold">3D模型预览</h1>
          <div class="flex flex-wrap gap-2">
            <button id="reset-view" class="btn px-4 py-2 rounded-lg bg-primary text-white">
              <i class="fa fa-refresh mr-1"></i>重置视图
            </button>
            <button id="toggle-rotate" class="btn px-4 py-2 rounded-lg bg-slate-600 text-white">
              <i class="fa fa-repeat mr-1"></i>暂停旋转
            </button>
            <button id="upload-btn" class="btn px-4 py-2 rounded-lg bg-emerald-600 text-white">
              <i class="fa fa-upload mr-1"></i>上传模型
            </button>
          </div>
        </div>

        <div class="canvas-container">
          <canvas id="viewer-canvas"></canvas>
        </div>
      </div>
    </section>

    <section id="controls" class="max-w-5xl mx-auto">
      <div class="panel rounded-2xl shadow-lg p-6">
        <h2 class="text-lg font-semibold mb-6 flex items-center">
          <i class="fa fa-sliders text-primary mr-2"></i>控制面板
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div>
            <label class="block text-sm font-medium mb-2">旋转速度</label>
            <input id="rotation-speed" type="range" min="0" max="10" value="5" class="w-full" />
            <div class="flex justify-between text-xs text-slate-500 mt-1">
              <span>慢</span>
              <span>快</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">环境光照</label>
            <input id="ambient-light" type="range" min="60" max="220" value="150" class="w-full" />
            <div class="flex justify-between text-xs text-slate-500 mt-1">
              <span>暗</span>
              <span>亮</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">缩放比例</label>
            <input id="scale-control" type="range" min="50" max="150" value="100" class="w-full" />
            <div class="flex justify-between text-xs text-slate-500 mt-1">
              <span>小</span>
              <span>大</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-3">模型颜色</label>
            <div class="grid grid-cols-3 gap-3">
              <button class="color-swatch active h-12 rounded-lg border border-slate-200" data-color="#9aa0a6" title="工业灰" style="background:#9aa0a6"></button>
              <button class="color-swatch h-12 rounded-lg border border-slate-200" data-color="#7c8aa0" title="蓝灰" style="background:#7c8aa0"></button>
              <button class="color-swatch h-12 rounded-lg border border-slate-200" data-color="#f97316" title="橙色强调" style="background:#f97316"></button>
            </div>
            <div class="flex justify-between text-xs text-slate-500 mt-2">
              <span>工业灰</span>
              <span>蓝灰</span>
              <span>橙色强调</span>
            </div>
          </div>
        </div>

        <div class="mt-6 text-sm text-slate-600 leading-7">
          <p>鼠标左键拖动旋转，滚轮缩放，右键平移。</p>
          <p>这版会强制清理 FreeCAD 导出模型里的暗顶点色和原贴图影响，优先解决“整体发黑”的问题。</p>
        </div>
      </div>
    </section>
  </main>

  <input id="file-input" type="file" accept=".gltf,.glb,.obj,.stl,model/gltf+json,model/gltf-binary" class="hidden" />

  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-white/30 border-t-white rounded-full animate-spin mx-auto mb-4"></div>
      <p id="loading-text" class="text-white text-lg">加载中...</p>
    </div>
  </div>

  <footer class="mt-12 py-8 text-center text-sm text-slate-500">
    <p>2026 工业3D模型展示页面</p>
  </footer>

  <script>
    const DEFAULT_COLOR = '#9aa0a6';

    const canvas = document.getElementById('viewer-canvas');
    const container = canvas.parentElement;
    const fileInput = document.getElementById('file-input');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf3f4f6);
    scene.fog = new THREE.Fog(0xf3f4f6, 25, 60);

    const camera = new THREE.PerspectiveCamera(
      50,
      container.clientWidth / container.clientHeight,
      0.1,
      3000
    );
    camera.position.set(5, 3, 8);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 1500;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0xe5e7eb, 1.3);
    scene.add(hemiLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 2.2);
    mainLight.position.set(10, 14, 12);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 120;
    mainLight.shadow.bias = -0.0005;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 1.25);
    fillLight.position.set(-10, 6, 10);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.85);
    rimLight.position.set(0, 10, -12);
    scene.add(rimLight);

    const frontLight = new THREE.DirectionalLight(0xffffff, 0.95);
    frontLight.position.set(0, 3, 14);
    scene.add(frontLight);

    const grid = new THREE.GridHelper(28, 14, 0xd1d5db, 0xe5e7eb);
    grid.position.y = -1.2;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.ShadowMaterial({ opacity: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.19;
    ground.receiveShadow = true;
    scene.add(ground);

    let modelRoot = null;
    let autoRotate = true;
    let rotationSpeed = 0.005;
    let currentColor = DEFAULT_COLOR;
    const clock = new THREE.Clock();

    function showLoading(text = '加载中...') {
      loadingText.textContent = text;
      loadingOverlay.classList.remove('hidden');
    }

    function hideLoading() {
      loadingOverlay.classList.add('hidden');
    }

    function disposeMaterial(material) {
      if (!material) return;
      if (Array.isArray(material)) {
        material.forEach(m => {
          if (!m) return;
          if (m.map) m.map.dispose();
          if (m.normalMap) m.normalMap.dispose();
          if (m.roughnessMap) m.roughnessMap.dispose();
          if (m.metalnessMap) m.metalnessMap.dispose();
          if (m.aoMap) m.aoMap.dispose();
          if (m.emissiveMap) m.emissiveMap.dispose();
          if (m.alphaMap) m.alphaMap.dispose();
          if (m.dispose) m.dispose();
        });
      } else {
        if (material.map) material.map.dispose();
        if (material.normalMap) material.normalMap.dispose();
        if (material.roughnessMap) material.roughnessMap.dispose();
        if (material.metalnessMap) material.metalnessMap.dispose();
        if (material.aoMap) material.aoMap.dispose();
        if (material.emissiveMap) material.emissiveMap.dispose();
        if (material.alphaMap) material.alphaMap.dispose();
        if (material.dispose) material.dispose();
      }
    }

    function clearCurrentModel() {
      if (!modelRoot) return;
      scene.remove(modelRoot);
      modelRoot.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        disposeMaterial(obj.material);
      });
      modelRoot = null;
    }

    function fitCameraToObject(object, offset = 1.75) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2));
      cameraZ *= offset;

      camera.position.set(
        center.x + maxDim * 0.5,
        center.y + maxDim * 0.28,
        center.z + cameraZ
      );

      controls.target.copy(center);
      controls.update();

      camera.near = Math.max(0.01, maxDim / 1000);
      camera.far = Math.max(3000, maxDim * 20);
      camera.updateProjectionMatrix();

      mainLight.target.position.copy(center);
      scene.add(mainLight.target);
    }

    function createIndustrialMaterial(colorHex) {
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(colorHex),
        metalness: 0.04,
        roughness: 0.74,
        vertexColors: false,
        transparent: false,
        opacity: 1
      });
    }

    function sanitizeGeometry(geometry) {
      if (!geometry) return;

      if (geometry.attributes.color) {
        geometry.deleteAttribute('color');
      }

      if (geometry.attributes.uv2) {
        geometry.deleteAttribute('uv2');
      }

      geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();
    }

    function applyIndustrialMaterial(object, colorHex) {
      object.traverse((obj) => {
        if (!obj.isMesh) return;

        sanitizeGeometry(obj.geometry);
        disposeMaterial(obj.material);

        obj.material = createIndustrialMaterial(colorHex);
        obj.castShadow = true;
        obj.receiveShadow = true;
      });
    }

    function applyColorToModel(colorHex) {
      currentColor = colorHex;
      if (!modelRoot) return;

      modelRoot.traverse((obj) => {
        if (!obj.isMesh || !obj.material) return;

        if (Array.isArray(obj.material)) {
          obj.material.forEach(mat => {
            if (!mat) return;
            mat.color.set(colorHex);
            mat.vertexColors = false;
            mat.map = null;
            mat.aoMap = null;
            mat.normalMap = null;
            mat.metalnessMap = null;
            mat.roughnessMap = null;
            mat.emissiveMap = null;
            mat.transparent = false;
            mat.opacity = 1;
            mat.needsUpdate = true;
          });
        } else {
          obj.material.color.set(colorHex);
          obj.material.vertexColors = false;
          obj.material.map = null;
          obj.material.aoMap = null;
          obj.material.normalMap = null;
          obj.material.metalnessMap = null;
          obj.material.roughnessMap = null;
          obj.material.emissiveMap = null;
          obj.material.transparent = false;
          obj.material.opacity = 1;
          obj.material.needsUpdate = true;
        }
      });
    }

    function updateActiveSwatch(colorHex) {
      document.querySelectorAll('.color-swatch').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color.toLowerCase() === colorHex.toLowerCase());
      });
    }

    function createFallbackModel() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1.2, 1.5),
        createIndustrialMaterial(currentColor)
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const shaftMat = new THREE.MeshStandardMaterial({
        color: 0xc2c8cf,
        metalness: 0.6,
        roughness: 0.28
      });

      const shaft1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 1.8, 32),
        shaftMat
      );
      shaft1.rotation.x = Math.PI / 2;
      shaft1.position.z = 1.05;
      shaft1.castShadow = true;
      group.add(shaft1);

      const shaft2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.24, 0.24, 2.2, 32),
        shaftMat
      );
      shaft2.rotation.x = Math.PI / 2;
      shaft2.position.z = -1.15;
      shaft2.castShadow = true;
      group.add(shaft2);

      const topBox = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.5, 0.9),
        createIndustrialMaterial(currentColor)
      );
      topBox.position.set(0.3, 0.8, 0);
      topBox.castShadow = true;
      group.add(topBox);

      return group;
    }

    function centerModelToGround(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      object.position.x -= center.x;
      object.position.z -= center.z;
      object.position.y -= box.min.y;
      object.position.y -= 1.2;

      if (size.y < 0.01) {
        object.scale.setScalar(100);
      }
    }

    function finalizeLoadedModel(object) {
      modelRoot = object;
      applyIndustrialMaterial(modelRoot, currentColor);
      centerModelToGround(modelRoot);
      scene.add(modelRoot);
      fitCameraToObject(modelRoot);
      hideLoading();
    }

    function loadDefaultModel() {
      showLoading('加载默认模型...');
      clearCurrentModel();

      const loader = new THREE.GLTFLoader();
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
        (gltf) => {
          finalizeLoadedModel(gltf.scene);
        },
        (xhr) => {
          if (xhr.total) {
            const progress = Math.round((xhr.loaded / xhr.total) * 100);
            showLoading(`加载默认模型... ${progress}%`);
          }
        },
        () => {
          finalizeLoadedModel(createFallbackModel());
        }
      );
    }

    function loadGLTForGLB(url) {
      const loader = new THREE.GLTFLoader();
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.140.2/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        url,
        (gltf) => {
          finalizeLoadedModel(gltf.scene);
          URL.revokeObjectURL(url);
        },
        undefined,
        (err) => {
          console.error(err);
          URL.revokeObjectURL(url);
          hideLoading();
          alert('GLTF / GLB 模型加载失败，请检查转换结果。');
        }
      );
    }

    function loadOBJ(url) {
      const loader = new THREE.OBJLoader();
      loader.load(
        url,
        (object) => {
          finalizeLoadedModel(object);
          URL.revokeObjectURL(url);
        },
        undefined,
        (err) => {
          console.error(err);
          URL.revokeObjectURL(url);
          hideLoading();
          alert('OBJ 模型加载失败。');
        }
      );
    }

    function loadSTL(url) {
      const loader = new THREE.STLLoader();
      loader.load(
        url,
        (geometry) => {
          sanitizeGeometry(geometry);

          const mesh = new THREE.Mesh(
            geometry,
            createIndustrialMaterial(currentColor)
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;

          const group = new THREE.Group();
          group.add(mesh);

          finalizeLoadedModel(group);
          URL.revokeObjectURL(url);
        },
        undefined,
        (err) => {
          console.error(err);
          URL.revokeObjectURL(url);
          hideLoading();
          alert('STL 模型加载失败。');
        }
      );
    }

    function loadUserModel(file) {
      const ext = file.name.toLowerCase().split('.').pop();
      const url = URL.createObjectURL(file);

      showLoading('加载上传模型...');
      clearCurrentModel();

      if (ext === 'gltf' || ext === 'glb') {
        loadGLTForGLB(url);
        return;
      }

      if (ext === 'obj') {
        loadOBJ(url);
        return;
      }

      if (ext === 'stl') {
        loadSTL(url);
        return;
      }

      URL.revokeObjectURL(url);
      hideLoading();
      alert('当前支持 GLTF / GLB / OBJ / STL 格式。');
    }

    document.getElementById('rotation-speed').addEventListener('input', (e) => {
      rotationSpeed = Number(e.target.value) * 0.001;
    });

    document.getElementById('ambient-light').addEventListener('input', (e) => {
      const v = Number(e.target.value) / 100;
      ambientLight.intensity = v;
      hemiLight.intensity = 0.9 + v * 0.2;
      mainLight.intensity = 1.2 + v * 0.65;
      fillLight.intensity = 0.8 + v * 0.3;
      rimLight.intensity = 0.55 + v * 0.18;
      frontLight.intensity = 0.65 + v * 0.2;
    });

    document.getElementById('scale-control').addEventListener('input', (e) => {
      if (!modelRoot) return;
      const scale = Number(e.target.value) / 100;
      modelRoot.scale.set(scale, scale, scale);
    });

    document.querySelectorAll('.color-swatch').forEach(btn => {
      btn.addEventListener('click', () => {
        const color = btn.dataset.color;
        applyColorToModel(color);
        updateActiveSwatch(color);
      });
    });

    document.getElementById('reset-view').addEventListener('click', () => {
      if (!modelRoot) return;

      modelRoot.rotation.set(0, 0, 0);
      modelRoot.scale.set(1, 1, 1);

      document.getElementById('scale-control').value = 100;
      document.getElementById('rotation-speed').value = 5;
      document.getElementById('ambient-light').value = 150;

      rotationSpeed = 0.005;
      ambientLight.intensity = 1.5;
      hemiLight.intensity = 1.3;
      mainLight.intensity = 2.2;
      fillLight.intensity = 1.25;
      rimLight.intensity = 0.85;
      frontLight.intensity = 0.95;

      fitCameraToObject(modelRoot);
      applyColorToModel(currentColor);
    });

    document.getElementById('toggle-rotate').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.currentTarget.innerHTML = autoRotate
        ? '<i class="fa fa-repeat mr-1"></i>暂停旋转'
        : '<i class="fa fa-play mr-1"></i>继续旋转';
    });

    document.getElementById('upload-btn').addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadUserModel(file);
      e.target.value = '';
    });

    window.addEventListener('resize', () => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (modelRoot && autoRotate) {
        modelRoot.rotation.y += rotationSpeed * (delta * 60);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    updateActiveSwatch(DEFAULT_COLOR);
    loadDefaultModel();
    animate();
  </script>
</body>
</html>
